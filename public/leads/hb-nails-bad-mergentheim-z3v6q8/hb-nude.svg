<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 740" role="img" aria-label="Natürliche Nude-Coffin-Nägel im Babyboomer-Verlauf mit rotem Akzentnagel">
  <defs>
    <radialGradient id="nbg2" cx="0.5" cy="0.32" r="0.95"><stop offset="0" stop-color="#211a1d"/><stop offset="1" stop-color="#0a0709"/></radialGradient>
    <linearGradient id="nud2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="0.4" stop-color="#f7ece5"/><stop offset="0.74" stop-color="#eaccbe"/><stop offset="1" stop-color="#d6a390"/></linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff5468"/><stop offset="0.5" stop-color="#e11330"/><stop offset="1" stop-color="#8f0f22"/></linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>
  <rect width="600" height="740" fill="url(#nbg2)"/>
  <ellipse cx="300" cy="612" rx="212" ry="38" fill="#000" opacity="0.55" filter="url(#soft)"/>

  <!-- five fuller coffin nails, fanned; middle is the red accent. Flat tapered tip like the real sets. -->
  <g transform="translate(300 512)" stroke-linejoin="round">
    <g transform="rotate(-21) translate(-214 30)">
      <path d="M6 -4 C 1 -60 12 -128 20 -150 L 58 -150 C 66 -128 77 -60 72 -4 C 68 30 10 30 6 -4 Z" fill="url(#nud2)" stroke="#c9998a" stroke-width="1.3"/>
      <path d="M28 -142 L 32 -30" stroke="#ffffff" stroke-width="3" opacity="0.38" stroke-linecap="round"/>
    </g>
    <g transform="rotate(-10) translate(-112 4)">
      <path d="M6 -4 C 0 -72 13 -156 22 -182 L 66 -182 C 75 -156 88 -72 82 -4 C 78 34 10 34 6 -4 Z" fill="url(#nud2)" stroke="#c9998a" stroke-width="1.3"/>
      <path d="M31 -172 L 35 -34" stroke="#ffffff" stroke-width="3.4" opacity="0.4" stroke-linecap="round"/>
    </g>
    <!-- red accent -->
    <g transform="rotate(0) translate(-6 -6)">
      <path d="M6 -4 C 0 -76 14 -164 23 -192 L 69 -192 C 78 -164 92 -76 86 -4 C 82 36 10 36 6 -4 Z" fill="url(#acc2)" stroke="#7a0d1c" stroke-width="1.3"/>
      <path d="M33 -178 L 37 -36" stroke="#ffffff" stroke-width="3.6" opacity="0.5" stroke-linecap="round"/>
      <path d="M56 -186 L 61 -40" stroke="#ffffff" stroke-width="2" opacity="0.28" stroke-linecap="round"/>
    </g>
    <g transform="rotate(10) translate(106 4)">
      <path d="M6 -4 C 0 -72 13 -156 22 -182 L 66 -182 C 75 -156 88 -72 82 -4 C 78 34 10 34 6 -4 Z" fill="url(#nud2)" stroke="#c9998a" stroke-width="1.3"/>
      <path d="M31 -172 L 35 -34" stroke="#ffffff" stroke-width="3.4" opacity="0.4" stroke-linecap="round"/>
    </g>
    <g transform="rotate(21) translate(208 30)">
      <path d="M6 -4 C 1 -60 12 -128 20 -150 L 58 -150 C 66 -128 77 -60 72 -4 C 68 30 10 30 6 -4 Z" fill="url(#nud2)" stroke="#c9998a" stroke-width="1.3"/>
      <path d="M28 -142 L 32 -30" stroke="#ffffff" stroke-width="3" opacity="0.38" stroke-linecap="round"/>
    </g>
  </g>

  <g fill="#e11330"><circle cx="120" cy="166" r="4" opacity="0.6"/><path d="M470 194 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z" opacity="0.5"/></g>
</svg>
