<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1040" role="img" aria-label="Mandelförmige Nägel mit French-Tips und Schwüngen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6ece6"/>
      <stop offset="0.55" stop-color="#efe1d8"/>
      <stop offset="1" stop-color="#e7d4c8"/>
    </linearGradient>
    <linearGradient id="nail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbeee9"/>
      <stop offset="0.6" stop-color="#f3d9d0"/>
      <stop offset="1" stop-color="#e6c7bd"/>
    </linearGradient>
    <linearGradient id="tip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9cc4ee"/>
      <stop offset="1" stop-color="#79a8e0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="820" height="1040" fill="url(#bg)"/>
  <ellipse cx="410" cy="360" rx="430" ry="430" fill="url(#glow)"/>

  <!-- soft shadow under the nail fan -->
  <ellipse cx="430" cy="760" rx="250" ry="70" fill="#c8a99c" opacity="0.35" filter="url(#soft)"/>

  <!-- nail fan: five almond nails -->
  <g transform="translate(410 560)">
    <!-- each nail group rotated around the fan -->
    <g transform="rotate(-34) translate(-170 -40)">
      <path d="M0 0 C 8 -150 64 -150 72 0 C 72 70 0 70 0 0 Z" fill="url(#nail)" stroke="#d9b7ab" stroke-width="2"/>
      <path d="M2 -118 C 12 -150 60 -150 70 -118 C 60 -150 12 -150 2 -118 Z" fill="url(#tip)"/>
      <path d="M14 -40 C 40 -70 30 -110 50 -135" fill="none" stroke="#cfe0f6" stroke-width="4" stroke-linecap="round"/>
      <path d="M24 -30 C 48 -64 40 -100 58 -126" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.8"/>
    </g>
    <g transform="rotate(-17) translate(-90 -78)">
      <path d="M0 0 C 9 -170 70 -170 79 0 C 79 76 0 76 0 0 Z" fill="url(#nail)" stroke="#d9b7ab" stroke-width="2"/>
      <path d="M3 -134 C 13 -170 66 -170 76 -134 C 66 -170 13 -170 3 -134 Z" fill="url(#tip)"/>
      <path d="M16 -46 C 44 -80 33 -124 56 -150" fill="none" stroke="#cfe0f6" stroke-width="4.4" stroke-linecap="round"/>
      <path d="M27 -34 C 52 -72 44 -112 64 -140" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" opacity="0.8"/>
    </g>
    <g transform="translate(-8 -96)">
      <path d="M0 0 C 9 -184 74 -184 83 0 C 83 80 0 80 0 0 Z" fill="url(#nail)" stroke="#d9b7ab" stroke-width="2"/>
      <path d="M3 -146 C 14 -184 69 -184 80 -146 C 69 -184 14 -184 3 -146 Z" fill="url(#tip)"/>
      <path d="M18 -50 C 48 -86 36 -134 60 -162" fill="none" stroke="#cfe0f6" stroke-width="4.6" stroke-linecap="round"/>
      <path d="M30 -36 C 56 -78 48 -120 68 -150" fill="none" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" opacity="0.85"/>
    </g>
    <g transform="rotate(17) translate(70 -78)">
      <path d="M0 0 C 9 -170 70 -170 79 0 C 79 76 0 76 0 0 Z" fill="url(#nail)" stroke="#d9b7ab" stroke-width="2"/>
      <path d="M3 -134 C 13 -170 66 -170 76 -134 C 66 -170 13 -170 3 -134 Z" fill="url(#tip)"/>
      <path d="M16 -46 C 44 -80 33 -124 56 -150" fill="none" stroke="#cfe0f6" stroke-width="4.4" stroke-linecap="round"/>
      <path d="M27 -34 C 52 -72 44 -112 64 -140" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" opacity="0.8"/>
    </g>
    <g transform="rotate(34) translate(150 -40)">
      <path d="M0 0 C 8 -150 64 -150 72 0 C 72 70 0 70 0 0 Z" fill="url(#nail)" stroke="#d9b7ab" stroke-width="2"/>
      <path d="M2 -118 C 12 -150 60 -150 70 -118 C 60 -150 12 -150 2 -118 Z" fill="url(#tip)"/>
      <path d="M14 -40 C 40 -70 30 -110 50 -135" fill="none" stroke="#cfe0f6" stroke-width="4" stroke-linecap="round"/>
      <path d="M24 -30 C 48 -64 40 -100 58 -126" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity="0.8"/>
    </g>
  </g>

  <!-- gold sparkles -->
  <g fill="#c4a26a">
    <path d="M210 250 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" opacity="0.85"/>
    <path d="M640 320 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5 z" opacity="0.7"/>
    <path d="M560 180 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" opacity="0.6"/>
    <circle cx="280" cy="430" r="3" opacity="0.5"/>
    <circle cx="600" cy="500" r="4" opacity="0.45"/>
  </g>
</svg>
