<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stilisierte Beauty-Illustration">
  <defs>
    <linearGradient id="bwBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e2e9"/>
      <stop offset="0.55" stop-color="#e7cad7"/>
      <stop offset="1" stop-color="#c98ca9"/>
    </linearGradient>
    <radialGradient id="bwGlow" cx="0.5" cy="0.38" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bwArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b0698a"/>
      <stop offset="1" stop-color="#8a4d6b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bwBg)"/>
  <rect width="800" height="1000" fill="url(#bwGlow)"/>
  <g fill="none" stroke="url(#bwArc)" stroke-linecap="round" opacity="0.55">
    <path d="M120 640 Q400 500 680 640" stroke-width="3"/>
    <path d="M150 700 Q400 570 650 700" stroke-width="2"/>
    <path d="M180 760 Q400 640 620 760" stroke-width="1.5"/>
  </g>
