    <g stroke="#5c3450" stroke-width="6" stroke-linecap="round">
      <path d="M-150 0 Q-170 -34 -196 -52"/>
      <path d="M-96 -60 Q-104 -96 -120 -122"/>
      <path d="M-30 -84 Q-32 -122 -40 -150"/>
